<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EasyLink — Yusf</title>
  <meta name="description" content="Yusf's personal link hub — cox az gulmeli, birazda trajedik." />

  <!-- Inline Inter font fallback + system fonts for speed -->
  <style>
    /* === SYSTEM-FIRST TYPOGRAPHY === */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 400 700;
      src: local('Inter'), local('Inter-Regular'),
           url(https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfMZs.woff2) format('woff2');
      font-display: swap;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>

  <style>
    /* === RESET & VARIABLES === */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --card-bg: rgba(18, 18, 26, 0.6);
      --card-hover: rgba(102, 126, 234, 0.15);
      --text: #ffffff;
      --text-muted: #a0a0b0;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --gradient: linear-gradient(135deg, #667eea, #764ba2);
    }

    /* === BASE STYLES === */
    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* Subtle animated background (no extra DOM) */
    body::before {
      content: '';
      position: fixed;
      inset: -10%;
      background:
        radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.07) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(118, 75, 162, 0.07) 0%, transparent 40%);
      animation: rotate 40s linear infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes rotate {
      to { transform: rotate(360deg); }
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    /* === PROFILE === */
    .avatar {
      width: 110px;
      height: 110px;
      margin: 0 auto 1.4rem;
      border-radius: 50%;
      background: var(--gradient);
      display: grid;
      place-content: center;
      font-size: 2.4rem;
      color: white;
      box-shadow: var(--shadow);
      border: 2px solid rgba(255, 255, 255, 0.15);
    }

    .name {
      font-size: 1.9rem;
      font-weight: 700;
      margin: 0 0 0.6rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .bio {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    /* === LINKS === */
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .link {
      display: flex;
      align-items: center;
      padding: 1rem 1.4rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .link:hover {
      transform: translateY(-2px) scale(1.015);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: grid;
      place-content: center;
      font-size: 1.4rem;
      margin-right: 1rem;
      font-weight: bold;
    }

    /* Platform-specific icon colors (using emoji or minimal SVG if needed) */
    .instagram { background: linear-gradient(45deg, #f09433, #bc1888); }
    .tiktok     { background: linear-gradient(45deg, #000, #fe2c55); }
    .telegram   { background: linear-gradient(45deg, #0088cc, #0066aa); }
    .discord    { background: linear-gradient(45deg, #5865f2, #4752c4); }

    .info { flex: 1; text-align: left; }
    .title { font-weight: 600; font-size: 1.05rem; }
    .handle { color: var(--text-muted); font-size: 0.85rem; }

    .arrow {
      opacity: 0.7;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .link:hover .arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    /* === FOOTER === */
    .footer {
      color: var(--text-muted);
      font-size: 0.85rem;
      padding-top: 1.8rem;
      border-top: 1px solid var(--border);
    }

    /* === RESPONSIVE === */
    @media (max-width: 480px) {
      .avatar { width: 96px; height: 96px; font-size: 2.1rem; }
      .name { font-size: 1.6rem; }
      .bio { font-size: 0.95rem; }
      .link { padding: 0.9rem 1.2rem; }
      .icon { width: 40px; height: 40px; font-size: 1.3rem; }
    }

    /* === ACCESSIBILITY === */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }

    .link:focus-visible {
      outline: 2px solid #667eea;
      outline-offset: 2px;
      z-index: 1;
    }

    /* === LIGHT TOUCH JS ENHANCEMENTS (INLINE) === */
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">👤</div>
    <h1 class="name">Yusif Muradli</h1>
    <p class="bio">cox az gulmeli, birazda trajedik</p>

    <div class="links">
      <a href="https://instagram.com/yusifmuradlieon" class="link" target="_blank" rel="noopener" aria-label="Instagram: @yusifmuradlieon">
        <div class="icon instagram">📸</div>
        <div class="info">
          <div class="title">Instagram</div>
          <div class="handle">@yusifmuradlieon</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://tiktok.com/@yusifmuradliaevix" class="link" target="_blank" rel="noopener" aria-label="TikTok: @yusifmuradliaevix">
        <div class="icon tiktok">🎵</div>
        <div class="info">
          <div class="title">TikTok</div>
          <div class="handle">@yusifmuradliaevix</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://t.me/yusifmuradlimonster" class="link" target="_blank" rel="noopener" aria-label="Telegram: @yusifmuradlimonster">
        <div class="icon telegram">✈️</div>
        <div class="info">
          <div class="title">Telegram</div>
          <div class="handle">@yusifmuradlimonster</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://discord.com/users/yusifmuradli.dharma" class="link" target="_blank" rel="noopener" aria-label="Discord: @yusifmuradli.dharma">
        <div class="icon discord">💬</div>
        <div class="info">
          <div class="title">Discord</div>
          <div class="handle">@yusifmuradli.dharma</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>

    <footer class="footer">
      &copy; 2026 Yusf. ❤
    </footer>
  </div>

  <!-- Minimal JS for subtle interactivity (optional but lightweight) -->
  <script>
    // Optional: Add slight hover lift without heavy parallax
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('mouseenter', () => {
        if (window.matchMedia('(hover: hover)').matches) {
          link.style.transform = 'translateY(-3px)';
        }
      });
      link.addEventListener('mouseleave', () => {
        link.style.transform = '';
      });
    });

    // Friendly console note
    console.log('%c 👋 cox az gulmeli, birazda trajedik.', 'color: #764ba2; font-size: 16px; font-weight: bold;');
  </script>
</body>
</html>
