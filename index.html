<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EasyLink — Yusf</title>
  <style>
    /* === GLOBAL RESET & THEME === */
    :root {
      --bg: #0f0f1b;
      --fg: #e6e6ff;
      --accent: #4d5bff;
      --card-bg: #1a1a2e;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }

    /* === HEADER === */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .name {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(to right, #a78bfa, #4d5bff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.7;
      margin-top: 0.4rem;
    }

    /* === LINK CARDS === */
    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .link-item {
      display: block;
      padding: 1rem;
      background: var(--card-bg);
      border-radius: 12px;
      text-decoration: none;
      color: var(--fg);
      font-weight: 500;
      text-align: center;
      transition: all 0.25s ease;
      border: 1px solid transparent;
    }

    .link-item:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(77, 91, 255, 0.15);
    }

    /* === RESPONSIVE === */
    @media (max-width: 480px) {
      .name { font-size: 2rem; }
      body { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="name">Yusf</div>
    <div class="subtitle">Content creator • Standoff2 • Original audio</div>
  </div>

  <div class="links">
    <!-- Replace these with your actual links -->
    <a href="https://discord.com/users/..." class="link-item">Discord</a>
    <a href="https://youtube.com/@..." class="link-item">YouTube</a>
    <a href="https://standoff2.com/profile/..." class="link-item">Standoff2</a>
    <a href="https://github.com/Yusf" class="link-item">GitHub</a>
  </div>
</body>
</html>
